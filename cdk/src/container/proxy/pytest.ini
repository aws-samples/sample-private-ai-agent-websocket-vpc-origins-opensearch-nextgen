[pytest]
# Run the proxy container suite from this directory:
#   cd cdk/src/container/proxy && python -m pytest tests -q
#
# asyncio_mode=auto lets plain `async def test_*` functions run without an
# explicit @pytest.mark.asyncio marker (pytest-asyncio). Most tests drive the
# app through Starlette's TestClient (which owns its own event loop); the mode
# is kept on for parity with the agent suite and any future async helpers.
asyncio_mode = auto
testpaths = tests
filterwarnings =
    ignore::DeprecationWarning
